template:
  - sensor:
      # WATCHDOG

      - name: "EMHASS Health"
        unique_id: emhass_health
        state: >
          {% if (now().timestamp() - as_timestamp(states.sensor.mpc_pv_optim_status.last_changed)) > 2700 %}
            MPC stalled
          {% elif states('sensor.mpc_pv_optim_status') != 'Optimal' %}
            MPC problem
          {% else %}
            OK
          {% endif %}

  - binary_sensor:
      - name: "EMHASS Healthy"
        state: >
          {{ states('sensor.emhass_health') == 'OK' }}
        device_class: problem

        