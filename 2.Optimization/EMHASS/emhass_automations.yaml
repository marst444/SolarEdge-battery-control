automation:
###########################
#. Machinelearning (ML) forecast is generated by first running a "fit" and then "predict"
#
############################ 
  - id: EMHASS_ML_forecast_fit
    alias: "EMHASS ML forecast fit"
    description: "Automatically generate EMHASS machinelearning (ML) forecast fit"
    trigger:
      - platform: time
        at: "19:00:00"
    condition:
      - condition: time
        weekday:
          - sun
    action:
      - service: script.run_mlforecast_fit_load
    mode: single
    
  - id: EMHASS_ML_forecast_predict
    alias: "EMHASS ML forecast predict"
    description: "Automatically generate EMHASS machinelearning (ML) forecast predict"
    trigger:
      - platform: time_pattern
        hours: "/6"
      - platform: homeassistant
        event: start
    condition: []
    action:
  # Only delay when triggered by restart
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.platform == 'homeassistant' }}"
            sequence:
              - delay: "00:05:00"
      - service: script.run_mlforecast_predict_load
    mode: single

##############################
#
# EMHASS Energy plan created using a script based runtime payload input ad modum Siegen Energy
#
###############################

  - id: generate_EMHASS_energy_plan_mpc_pv
    alias: "Generate EMHASS energy plan mpc pv"
    description: "Automatically generate EMHASS energy plan for PV using MPC and ML"

    trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: homeassistant
        event: start

    condition: []
    action:
  # Only delay when triggered by restart
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.platform == 'homeassistant' }}"
            sequence:
              - delay: "00:05:00"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.emhass_last_mpc_run
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.emhass_mpc_status
        data:
          value: "RUNNING"
      - service: script.generate_emhass_energy_plan_mpc_pv
      - choose:
          - conditions:
              - condition: state
                entity_id: sensor.mpc_pv_optim_status
                state: "Optimal"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.emhass_mpc_status
                data:
                  value: "OK"
              - service: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.emhass_mpc_last_success
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        default:
          - service: input_text.set_value
            target:
              entity_id: input_text.emhass_mpc_status
            data:
              value: "FAILED"
    mode: single



      
  - id: generate_EMHASS_energy_plan_dh_pv
    alias: "Generate EMHASS energy plan dh pv"
    description: "Automatically generate EMHASS energy plan for PV using DH and ML"

    trigger:
      - platform: time
        at: "00:00"
      - platform: homeassistant
        event: start

    condition: []
    action:
  # Only delay when triggered by restart
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.platform == 'homeassistant' }}"
            sequence:
              - delay: "00:05:00"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.emhass_last_dayahead_run
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.emhass_dayahead_status
        data:
          value: "RUNNING"
      - service: script.generate_emhass_energy_plan_dh_pv
      - choose:
          - conditions:
              - condition: state
                entity_id: sensor.dh_pv_optim_status
                state: "Optimal"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.emhass_dayahead_status
                data:
                  value: "OK"
              - service: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.emhass_dayahead_last_success
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        default:
          - service: input_text.set_value
            target:
              entity_id: input_text.emhass_dayahead_status
            data:
              value: "FAILED"
    mode: single