  trigger_mpc_optim:
    url: "http://192.168.10.3:5000/action/naive-mpc-optim"
    method: POST
    timeout: 60
    headers:
      Content-Type: "application/json"
    payload: >
      {% set now_ts = now().replace(minute=(now().minute // 15) * 15,
                                    second=0,
                                    microsecond=0) %}
      {% set max_horizon = 96 %}

      {# ------------------------------------------------------------------ #}
      {# Helper: convert ANY time to local ISO string with correct offset   #}
      {# ------------------------------------------------------------------ #}
      {% macro to_local_iso(t) -%}
      {{ (t
          | as_timestamp
          | timestamp_custom('%Y-%m-%dT%H:%M:%S%z', true))
          | regex_replace('([+-]\\d{2})(\\d{2})$', '\\1:\\2') }}
      {%- endmacro %}

      {# ------------------------------------------------------------------ #}
      {# 1. DAY-AHEAD LOAD FORECAST (EMHASS p_load_forecast)                 #}
      {# ------------------------------------------------------------------ #}
      {% set load_forecasts = state_attr('sensor.p_load_forecast', 'forecasts') or [] %}
      {% set future_load = namespace(items=[]) %}

      {% for item in load_forecasts %}
        {% if item.date | as_timestamp >= now_ts | as_timestamp %}
          {% set future_load.items = future_load.items + [item] %}
        {% endif %}
      {% endfor %}

      {% set horizon = future_load.items | length %}
      {% if horizon > max_horizon %}
        {% set horizon = max_horizon %}
      {% endif %}

      {% if horizon == 0 %}
        {{ {'error': 'MPC horizon exhausted – waiting for next day-ahead run'} | tojson }}
      {% else %}

      {% set ns_load = namespace(d={}) %}
      {% for item in future_load.items[:horizon] %}
        {% set ts = to_local_iso(item.date) %}
        {% set ns_load.d = ns_load.d | combine({ ts: item.p_load_forecast | float }) %}
      {% endfor %}

      {# ------------------------------------------------------------------ #}
      {# 2. PRICE FORECASTS (Nordpool import / export)                       #}
      {# ------------------------------------------------------------------ #}
      {% set import_prices = state_attr('sensor.nordpool_se3_total_costs_import',
                                        'forecast_merged') or [] %}
      {% set export_prices = state_attr('sensor.nordpool_se3_total_revenue_export',
                                        'forecast_merged') or [] %}

      {% set ns_load_cost = namespace(d={}) %}
      {% for item in import_prices[:horizon] %}
        {% set base_ts = item.ts.split(' - ')[0] %}
        {% set ts = to_local_iso(strptime(base_ts, '%Y-%m-%d %H:%M')) %}
        {% set ns_load_cost.d = ns_load_cost.d | combine({ ts: item.price }) %}
      {% endfor %}

      {% set ns_prod_price = namespace(d={}) %}
      {% for item in export_prices[:horizon] %}
        {% set base_ts = item.ts.split(' - ')[0] %}
        {% set ts = to_local_iso(strptime(base_ts, '%Y-%m-%d %H:%M')) %}
        {% set ns_prod_price.d = ns_prod_price.d | combine({ ts: item.price }) %}
      {% endfor %}

      {# ------------------------------------------------------------------ #}
      {# 3. PV FORECAST (Solcast)                                           #}
      {# ------------------------------------------------------------------ #}
      {% set pv_forecasts = state_attr('sensor.solcast_pv_forecast_15min_intervals',
                                       'forecast_merged') or [] %}
      {% set ns_pv = namespace(d={}) %}
      {% for item in pv_forecasts[:horizon] %}
        {% set base_ts = item.ts.split(' - ')[0] %}
        {% set ts = to_local_iso(strptime(base_ts, '%Y-%m-%d %H:%M')) %}
        {% set ns_pv.d = ns_pv.d | combine({
          ts: (item.pv_estimate * 1000) | round(0)
        }) %}
      {% endfor %}

      {# ------------------------------------------------------------------ #}
      {# 4. MPC PAYLOAD                                                    #}
      {# ------------------------------------------------------------------ #}
      {
        "prediction_horizon": {{ horizon }},
        "load_power_forecast": {{ ns_load.d | tojson }},
        "load_cost_forecast": {{ ns_load_cost.d | tojson }},
        "prod_price_forecast": {{ ns_prod_price.d | tojson }},
        "pv_power_forecast": {{ ns_pv.d | tojson }},
        "soc_init": {{ (states('sensor.solaredge_b1_state_of_energy') | float) / 100 }},
        "soc_final": 0.3,
        "set_use_battery": true,
        "battery_minimum_state_of_charge": 0.2,
        "battery_maximum_state_of_charge": 0.9,
        "battery_discharge_power_max": 3300,
        "battery_charge_power_max": 3300,
        "battery_discharge_efficiency": 0.9,
        "battery_charge_efficiency": 0.95,
        "battery_nominal_energy_capacity": 5000,
        "inverter_stress_cost": 0.05,
        "inverter_stress_segments": 10,
        "publish_prefix": "mpc_"
      }

      {% endif %}