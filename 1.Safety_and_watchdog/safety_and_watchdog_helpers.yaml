input_number:

  minimum_state_of_charge:
    name: Battery Min SOC
    initial: 20
    min: 0
    max: 100
    step: 1
    mode: box

  maximum_state_of_charge:
    name: Battery Max SOC
    initial: 90
    min: 0
    max: 100
    step: 1
    mode: box

  ac_maxpower:
    name: AC Max Power
    initial: 5000
    min: 5000
    max: 10000
    step: 100
    mode: box
    
  safety_min_discharge_limit:
    name: Safety Minimum Discharge Limit
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: W
    mode: box
    initial: 1000

  safety_recovery_charge_limit:
    name: Safety Recovery Charge Limit
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: W
    mode: box
    initial: 3000

input_datetime:

  emhass_last_dayahead_run:
    name: EMHASS Last Dayahead Run
    has_date: true
    has_time: true

  emhass_last_mpc_run:
    name: EMHASS Last MPC Run
    has_date: true
    has_time: true

  emhass_dayahead_last_success:
    name: EMHASS Dayahead last success
    has_date: true
    has_time: true  
  
  emhass_mpc_last_success:
    name: EMHASS MPC last success
    has_date: true
    has_time: true

input_text:

  emhass_mpc_status:
    name: EMHASS MPC status
    
  emhass_dayahead_status:
    name: EMHASS dayahead status    

  effective_battery_reason:
    name: Effective Battery Reason
    max: 255

input_boolean:
  battery_safety_override_active:
    name: Battery Safety Override Active
    icon: mdi:shield-alert

  battery_force_discharge:
    name: Battery Force Discharge
    icon: mdi:battery-arrow-down

  battery_force_charge:
    name: Battery Force Charge
    icon: mdi:battery-arrow-up

  battery_discharge_blocked:
    name: Battery Discharge Blocked
    icon: mdi:battery-off

  battery_charge_blocked:
    name: Battery Charge Blocked
    icon: mdi:battery-off-outline

# Killswitch for whole battery control system.
  effective_battery_control_enabled:
    name: Effective Battery Control Enabled
    icon: mdi:battery-cog