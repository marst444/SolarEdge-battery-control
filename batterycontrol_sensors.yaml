template:
  - sensor:
      # Current value of energy stored in battery (cost already paid)
      - name: "Battery Value"
        unique_id: battery_value
        unit_of_measurement: "SEK"
        state: >
          {% set soc = states('sensor.solaredge_b1_state_of_energy') | float(0) / 100 %}
          {% set capacity = 4.6 %}
          {% set avg_price_paid = states('input_number.avarage_last_chargingprice') | float(0) %}
          {{ (soc * capacity * avg_price_paid) | round(2) }}

      # Worth using battery for house load
      - name: "Use Battery for House Load Worth It"
        unique_id: use_battery_for_house_load_worth_it
        state: >
          {% set battery_value = states('sensor.battery_value') | float(0) %}
          {% set soc = states('sensor.solaredge_b1_state_of_energy') | float(0) / 100 %}
          {% set capacity = 4.6 %}
          {% set current_import_price = states('sensor.total_import_price') | float(0) %}
          {% set potential_saving = soc * capacity * current_import_price %}
          {{ potential_saving > battery_value }}

      # Worth exporting battery to grid
      - name: "Battery Worth Exporting"
        unique_id: battery_worth_exporting
        state: >
          {% set battery_value = states('sensor.battery_value') | float(0) %}
          {% set soc = states('sensor.solaredge_b1_state_of_energy') | float(0) / 100 %}
          {% set capacity = 4.6 %}
          {% set current_export_price = states('sensor.total_export_price') | float(0) %}
          {% set potential_revenue = soc * capacity * current_export_price %}
          {{ potential_revenue > battery_value }}

      # === Dynamic Storage Charge Limit ===
      - name: "Dynamic Storage Charge Limit"
        unique_id: dynamic_storage_charge_limit
        unit_of_measurement: "W"
        state: >
          {% set soc_now = states('sensor.solaredge_b1_state_of_energy') | float(0) %}
          {% set forecast_raw = state_attr('sensor.soc_batt_forecast', 'battery_scheduled_soc') or [] %}
          {% set batt_capacity_wh = 4600 %}
          {% set now_ts = as_timestamp(now()) %}
          {% if forecast_raw | length >= 1 %}
            {% set first_ts = as_timestamp(forecast_raw[0].date) %}
            {% if first_ts < now_ts %}
              {% set forecast = forecast_raw[1:] %}
            {% else %}
              {% set forecast = forecast_raw %}
            {% endif %}
          {% else %}
            {% set forecast = [] %}
          {% endif %}
          {% if forecast | length >= 1 %}
            {% set next_forecast = forecast[0].soc_batt_forecast | float(0) %}
            {% set power = ((next_forecast - soc_now) / 100 * batt_capacity_wh) | round(0) %}
            {{ power if power > 0 else 0 }}
          {% else %}
            {{ states('input_number.last_charge_limit') | float(3300) }}
          {% endif %}

      # === Dynamic Storage Discharge Limit ===
      - name: "Dynamic Storage Discharge Limit"
        unit_of_measurement: "W"
        unique_id: dynamic_storage_discharge_limit
        state: >
          {% set soc_now = states('sensor.solaredge_b1_state_of_energy') | float(0) %}
          {% set forecast_raw = state_attr('sensor.soc_batt_forecast', 'battery_scheduled_soc') or [] %}
          {% set batt_capacity_wh = 4600 %}
          {% set now_ts = as_timestamp(now()) %}
          {% if forecast_raw | length >= 1 %}
            {% set first_ts = as_timestamp(forecast_raw[0].date) %}
            {% if first_ts < now_ts %}
              {% set forecast = forecast_raw[1:] %}
            {% else %}
              {% set forecast = forecast_raw %}
            {% endif %}
          {% else %}
            {% set forecast = [] %}
          {% endif %}
          {% if forecast | length >= 1 %}
            {% set next_forecast = forecast[0].soc_batt_forecast | float(0) %}
            {% set power = ((next_forecast - soc_now) / 100 * batt_capacity_wh) | round(0) %}
            {{ (-power) if power < 0 else 0 }}
          {% else %}
            {{ states('input_number.last_discharge_limit') | float(3300) }}
          {% endif %}

      # === Smoothed SOC Forecast ===
      - name: "SOC Batt Forecast Smooth"
        unique_id: soc_batt_forecast_smooth
        unit_of_measurement: "%"
        state: >
          {% set forecast_raw = state_attr('sensor.soc_batt_forecast', 'battery_scheduled_soc') or [] %}
          {% set now_ts = as_timestamp(now()) %}
          {# Keep only future entries #}
          {% set forecast = forecast_raw | selectattr('date', 'defined') | list %}
          {% set forecast_future = forecast | selectattr('date', '>=', now() | string) | list %}

          {% if forecast_future | length >= 3 %}
            {% set s1 = forecast_future[0].soc_batt_forecast | float %}
            {% set s2 = forecast_future[1].soc_batt_forecast | float %}
            {% set s3 = forecast_future[2].soc_batt_forecast | float %}
            {{ ((s1*0.5 + s2*0.3 + s3*0.2)) | round(2) }}
          {% elif forecast_future | length >= 1 %}
            {{ forecast_future[0].soc_batt_forecast | float }}
          {% else %}
            0
          {% endif %}





input_number:
  grid_charge_price_total:
    name: Grid Charge Price Total
    initial: 0
    min: 0
    max: 100000
    step: 0.01

  grid_charge_intervals:
    name: Grid Charge Intervals
    initial: 0
    min: 0
    max: 1000
    step: 1

  avarage_last_chargingprice:
    initial: 0
    min: 0
    max: 1000
    step: 0.01    
    
  dynamic_discharge_limit:
    name: Dynamic Discharge Power
    initial: 3300
    min: 0
    max: 10000
    step: 1

  dynamic_charge_limit:
    name: Dynamic Charge Power
    initial: 3300
    min: 0
    max: 10000
    step: 1

  soc_target:
    name: SOC Target
    initial: 30
    min: 10
    max: 95
    step: 0.1    
    
  last_charge_limit:
    name: Last Charge Limit
    min: 0
    max: 5000
    step: 1

  last_discharge_limit:
    name: Last Discharge Limit
    min: 0
    max: 5000
    step: 1
  
  soc_deadband:
    name: SOC Deadband
    initial: 3.33
    min: 0
    max: 10
    step: 0.1
    
  minimum_state_of_charge:
    name: Battery Min SOC
    initial: 20
    min: 0
    max: 100
    step: 1
    mode: box

  maximum_state_of_charge:
    name: Battery Max SOC
    initial: 90
    min: 0
    max: 100
    step: 1
    mode: box

  ac_maxpower:
    name: AC Max Power
    initial: 5000
    min: 5000
    max: 10000
    step: 100
    mode: box
