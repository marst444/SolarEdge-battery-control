#######################################################
#. Valid options: 
#  Solar Power Only (Off) 
#. Charge from Clipped Solar Power
#. Charge from Solar Power
#. Charge from Solar Power and Grid
#. Discharge to Maximize Export
#. Discharge to Minimize Import
#. Maximize Self Consumption
#
########################################################

input_boolean:
  modbus_busy:
    name: Modbus Busy
    initial: off

script:
  modbus_queue:
    alias: Modbus Queue
    description: Handles queued Modbus commands to avoid communication errors
    fields:
      queue_service:
        description: "Service to call"
      queue_value:
        description: "Value to send"

    sequence:

      # Log incoming command
      - service: system_log.write
        data:
          message: "[{{ now() }}] Modbus Queue → Received command: {{ queue_service }}, Value: {{ queue_value }}, Modbus Busy: {{ states('input_boolean.modbus_busy') }}"
          level: warning

      # DEBUG START
      - service: system_log.write
        data:
          message: >
            DEBUG START →
            queue_service="{{ queue_service }}",
            queue_value="{{ queue_value }}",
            busy="{{ states('input_boolean.modbus_busy') }}"
          level: warning

      # Wait until Modbus is free
      - wait_template: "{{ not is_state('input_boolean.modbus_busy', 'on') }}"
        timeout: "00:00:10"
        continue_on_timeout: true

      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.modbus_busy

      # DEBUG LOCK
      - service: system_log.write
        data:
          message: >
            DEBUG LOCK ACQUIRED →
            queue_service="{{ queue_service }}"
          level: warning

      # DEBUG BEFORE CHOOSE
      - service: system_log.write
        data:
          message: >
            DEBUG BEFORE CHOOSE →
            queue_service="{{ queue_service }}"
          level: warning

      # CHOOSE BLOCK
      - choose:

          - conditions:
              - condition: template
                value_template: "{{ 'set_storage_command_timeout' in queue_service }}"
            sequence:
              - service: number.set_value
                target:
                  entity_id: number.solaredge_i1_storage_command_timeout
                data:
                  value: "{{ queue_value | int }}"
              - delay: "00:00:02"
# Charge from solar power and grid
          - conditions:
              - condition: template
                value_template: "{{ 'charge_from_solar_power_and_grid' in queue_service }}"
            sequence:
              - service: system_log.write
                data:
                  message: "[{{ now() }}] Modbus Queue → SET MODE = Charge from Solar Power and Grid"
                  level: warning
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_command_mode
                data:
                  option: Charge from Solar Power and Grid
              - delay: "00:00:02"
# Maxmize self consumption
          - conditions:
              - condition: template
                value_template: "{{ 'maximize_self_consumption' in queue_service }}"
            sequence:
              - service: system_log.write
                data:
                  message: "[{{ now() }}] Modbus Queue → SET MODE = Maximize Self Consumption"
                  level: warning
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_command_mode
                data:
                  option: Maximize Self Consumption
              - delay: "00:00:02"
# Charge from solar power
          - conditions:
              - condition: template
                value_template: "{{ 'charge_from_solar_power' in queue_service }}"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_command_mode
                data:
                  option: Charge from Solar Power
              - delay: "00:00:02"
# Charge from clipped colar power
          - conditions:
              - condition: template
                value_template: "{{ 'charge_from_clipped_solar_power' in queue_service }}"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_command_mode
                data:
                  option: Charge from Clipped Solar Power
              - delay: "00:00:02"
# discharge to maximize export
          - conditions:
              - condition: template
                value_template: "{{ 'discharge_to_maximize_export' in queue_service }}"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_command_mode
                data:
                  option: Discharge to Maximize Export
              - delay: "00:00:02"
# Discharge to minimize import
          - conditions:
              - condition: template
                value_template: "{{ 'discharge_to_minimize_import' in queue_service }}"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_command_mode
                data:
                  option: Discharge to Minimize Import
              - delay: "00:00:02"
# solar power only
          - conditions:
              - condition: template
                value_template: "{{ 'solar_power_only' in queue_service }}"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_command_mode
                data:
                  option: Solar Power Only (Off)
              - delay: "00:00:02"
              
# charge limit
          - conditions:
              - condition: template
                value_template: "{{ 'set_storage_charge_limit' in queue_service }}"
            sequence:
              - service: number.set_value
                target:
                  entity_id: number.solaredge_i1_storage_charge_limit
                data:
                  value: "{{ queue_value | int }}"
              - delay: "00:00:02"
              
# discharge limit
          - conditions:
              - condition: template
                value_template: "{{ 'set_storage_discharge_limit' in queue_service }}"
            sequence:
              - service: number.set_value
                target:
                  entity_id: number.solaredge_i1_storage_discharge_limit
                data:
                  value: "{{ queue_value | int }}"
              - delay: "00:00:02"
              
# dynamic discharge limit
          - conditions:
              - condition: template
                value_template: "{{ 'set_dynamic_storage_discharge_limit' in queue_service }}"
            sequence:
              - service: number.set_value
                target:
                  entity_id: number.solaredge_i1_storage_discharge_limit
                data:
                  value: "{{ queue_value | float }}"
              - delay: "00:00:02"
              
# dynamic charge limit
          - conditions:
              - condition: template
                value_template: "{{ queue_service == 'set_dynamic_storage_charge_limit' }}"
            sequence:
              - service: number.set_value
                target:
                  entity_id: number.solaredge_i1_storage_charge_limit
                data:
                  value: "{{ queue_value | float }}"
              - delay: "00:00:02"

        default:
          - service: system_log.write
            data:
              message: >
                ❌ DEBUG ERROR →
                No matching queue_service="{{ queue_service }}"
              level: error

      # DEBUG END
      - service: system_log.write
        data:
          message: >
            DEBUG END →
            queue_service="{{ queue_service }}"
          level: warning

      # Release Modbus lock
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.modbus_busy

      - service: system_log.write
        data:
          message: "[{{ now() }}] Modbus Queue → Lock released, command {{ queue_service }} completed"
          level: warning

    mode: queued
    max: 10